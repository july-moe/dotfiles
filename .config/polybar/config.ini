[colors]
background = ${colors.base}
background-alt = ${colors.blue}
foreground = ${colors.text}
primary = ${colors.mauve}
secondary = ${colors.mantle}
alert = ${colors.red}
disabled = ${colors.subtext1}

[bar/mainbar-i3]
width = 100%
height = 28pt
radius = 5
;bottom = true

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 6pt

;border-size = 2pt
;border-bottom = 0
border-color = #000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.flamingo}
font-0 = "Hack Nerd Font Mono:style=Regular:size=14;6"
font-1 = "Hack Nerd Font Mono:style=Regular:size=16;6"
font-2 = "FiraCode Nerd Font Mono:style=Bold:size=28;8"


;modules-right = pulseaudio xkeyboard memory cpu battery date wlan tray
modules-right = pulseaudio  memory cpu battery date wlan
;modules-center = 
modules-left = xworkspaces xwindow
cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/tray]
type = internal/tray
;tray-padding = 5pt
format-margin = 8pt
tray-spacing = 16pt
;tray-size = 80%
tray-background = ${colors.background}
tray-foreground = ${colors.primary}

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.mauve}
label-active-foreground = ${colors.crust}
label-active-underline= ${colors.mauve}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected =  %{F#F0C674}%ifname%%{F-} %essid%
;label-connected-foreground = ${colors.primary}

;label-disconnected = not connected
;label-disconnected-foreground = ${colors.primary}


[module/date]
type = internal/date
interval = 1

date = %H:%M 
date-alt = %Y-%m-%d %H:%M

label = %date%
label-foreground = ${colors.primary}


[module/battery]
type = internal/battery
format-prefix = "BAT "
format-prefix-foreground = ${colors.primary}
full-at = 99
format-charging =%{T2}<animation-charging>%{T-}%{T1} <label-charging>%{T-}
animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
; Framerate in milliseconds
animation-charging-framerate = 750
animation-charging-foreground = ${colors.peach}
format-discharging =%{T3}<ramp-capacity>%{T-}%{T1} <label-discharging>%{T-}
ramp-capacity-0 = ÔČĄ 
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ 
ramp-capacity-4 = ÔČÄ
icon-size = 24
low-at = 5
battery = BAT0
adapter = ACAD
poll-interval = 5

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
